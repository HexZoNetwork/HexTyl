# Internet war profile (very restrictive)
limit_req zone=global_www_internetwar burst=8 nodelay;

# Drop suspicious random-query floods before reaching PHP.
if ($args ~ ".{120,}") {
    return 444;
}

location /auth/login {
    limit_req zone=auth_login_internetwar burst=1 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}

location /api/ {
    limit_req zone=global_api_internetwar burst=3 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}
